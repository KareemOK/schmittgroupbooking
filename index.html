<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instrument Booking</title>
<style>
  :root {
    --bg: #f7f6f3; --card: #fff; --ink: #1d1c1a; --muted: #7a766f;
    --line: #e4e1da; --accent: #c2410c; --taken: #efe9e2;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--ink); line-height: 1.5; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 32px 20px 64px; }
  h1 { font-size: 1.6rem; margin: 0 0 4px; letter-spacing: -0.02em; }
  .sub { color: var(--muted); margin: 0 0 24px; font-size: 0.95rem; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 18px; }
  .controls { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; padding: 16px 18px; margin-bottom: 20px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  input, select { font: inherit; padding: 8px 10px; border: 1px solid var(--line);
    border-radius: 8px; background: #fff; color: var(--ink); }
  input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  button.primary { font: inherit; cursor: pointer; border: none; background: var(--accent);
    color: #fff; border-radius: 8px; padding: 9px 16px; font-weight: 600; }
  button.primary:hover { background: #a8380a; }

  .login { max-width: 340px; }
  .login .field { margin-bottom: 14px; }
  .login input, .login select { width: 100%; }

  .who-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; font-size: 0.9rem; color: var(--muted); }
  .who-bar b { color: var(--ink); }
  .who-bar button { font: inherit; cursor: pointer; border: 1px solid var(--line);
    background: #fff; border-radius: 8px; padding: 5px 10px; font-size: 0.85rem; }

  .weeknav { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .weeknav button { font: inherit; cursor: pointer; border: 1px solid var(--line);
    background: #fff; border-radius: 8px; padding: 6px 12px; }
  .weeknav button:hover { background: #fff7ed; }
  .weeknav .label { font-weight: 600; }

  .scroll { overflow-x: auto; }
  table { border-collapse: collapse; background: var(--card); border: 1px solid var(--line);
          border-radius: 12px; overflow: hidden; width: 100%; min-width: 1080px;
          table-layout: fixed; }
  th, td { border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); padding: 0; }
  th:last-child, td:last-child { border-right: none; }
  tr:last-child td { border-bottom: none; }
  /* First column (instrument names) fixed width; the 7 day columns share the rest equally. */
  th:first-child, td:first-child { width: 230px; }
  th:not(:first-child), td:not(:first-child) { width: calc((100% - 230px) / 7); }
  thead th { background: #faf8f5; font-size: 0.82rem; padding: 8px 6px; color: var(--muted); font-weight: 600; }
  thead th.today { color: var(--accent); }
  .inst { text-align: left; padding: 10px 14px; font-size: 0.88rem; background: #faf8f5;
          white-space: nowrap; font-weight: 500; }

  .cell { width: 100%; min-height: 46px; border: none; background: #fff; cursor: pointer;
          font: inherit; font-size: 0.82rem; padding: 8px 6px; transition: background 0.12s;
          white-space: nowrap; }
  .cell:hover { background: #fff7ed; }
  .cell.taken { background: var(--taken); cursor: default; }
  .cell.mine { background: #fde7d6; color: var(--accent); font-weight: 600; }
  .cell .free { color: #b8b2a8; }

  .status { margin-top: 16px; font-size: 0.9rem; color: var(--muted); min-height: 1.2em; }
  .err { color: var(--accent); }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Instrument Booking</h1>
  <p class="sub">Book an instrument for a whole day. Tap a free day to book; tap your own booking to cancel.</p>

  <!-- LOGIN -->
  <div id="loginView" class="card login">
    <div class="field">
      <label for="who">Name</label>
      <select id="who"><option>Loading...</option></select>
    </div>
    <div class="field">
      <label for="pw">Password</label>
      <input id="pw" type="password" placeholder="Your password">
    </div>
    <button class="primary" id="loginBtn">Log in</button>
    <p class="status" id="loginStatus"></p>
  </div>

  <!-- APP -->
  <div id="appView" class="hidden">
    <div class="who-bar">
      Logged in as <b id="meLabel"></b>
      <button id="logoutBtn">Log out</button>
    </div>

    <div class="weeknav">
      <button id="prev">&larr; Prev</button>
      <span class="label" id="weeklabel"></span>
      <button id="next">Next &rarr;</button>
      <button id="todayBtn">Today</button>
    </div>

    <div class="scroll"><table id="grid"></table></div>
    <p class="status" id="status"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== FILL THESE IN (from Supabase: Project Settings > API) =====
const SUPABASE_URL = "https://beoznyfeufjwdvtzvrhv.supabase.co";
const SUPABASE_KEY = "sb_publishable_5CbBPJWyI5aaOw34mLAF6A_rlsLxC_u";
// =================================================================

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const $ = id => document.getElementById(id);
let me = null;                 // logged-in name
let bookings = [];
let INSTRUMENTS = [
  "Quantachrome (measurement)",
  "Quantachrome (activation 1)",
  "Quantachrome (activation 2)",
  "Furnace",
  "Robot",
  "3D Printer"
];
let weekStart = startOfWeek(new Date());

// ---------- date helpers ----------
function startOfWeek(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function ymd(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

// ---------- login ----------
async function loadPeople(){
  const { data, error } = await db.rpc("get_people");
  const sel = $("who");
  if (error || !data){ sel.innerHTML = "<option>Couldn't load</option>"; return; }
  sel.innerHTML = data.map(p => `<option value="${p.name}">${p.name}</option>`).join("");
}

async function doLogin(){
  const name = $("who").value;
  const pw = $("pw").value;
  $("loginStatus").textContent = "Checking...";
  $("loginStatus").className = "status";
  const { data, error } = await db.rpc("check_password", { p_name: name, p_password: pw });
  if (error){ $("loginStatus").textContent = "Login error. Try again."; $("loginStatus").className = "status err"; return; }
  if (!data){ $("loginStatus").textContent = "Wrong password."; $("loginStatus").className = "status err"; return; }
  me = name;
  localStorage.setItem("bookingUser", name);
  showApp();
}

function showApp(){
  $("loginView").classList.add("hidden");
  $("appView").classList.remove("hidden");
  $("meLabel").textContent = me;
  loadBookings();
}

function logout(){
  me = null;
  localStorage.removeItem("bookingUser");
  $("appView").classList.add("hidden");
  $("loginView").classList.remove("hidden");
  $("pw").value = "";
}

// ---------- bookings ----------
async function loadBookings(){
  const { data, error } = await db.from("bookings").select("id,instrument,date,name");
  if (error){ setStatus("Couldn't load bookings.", true); return; }
  bookings = data;
  render();
  setStatus("");
}

function setStatus(msg,isErr){ $("status").textContent=msg; $("status").className=isErr?"status err":"status"; }

const DAYNAMES=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
function render(){
  const days=[]; for(let i=0;i<7;i++) days.push(addDays(weekStart,i));
  const todayStr=ymd(new Date());
  $("weeklabel").textContent =
    days[0].toLocaleDateString(undefined,{day:"numeric",month:"short"})+" – "+
    days[6].toLocaleDateString(undefined,{day:"numeric",month:"short",year:"numeric"});

  let html="<thead><tr><th class='inst'>Instrument</th>";
  for(const d of days){ const ds=ymd(d);
    html+=`<th class="${ds===todayStr?"today":""}">${DAYNAMES[(d.getDay()+6)%7]}<br>${d.getDate()}/${d.getMonth()+1}</th>`; }
  html+="</tr></thead><tbody>";

  for(const inst of INSTRUMENTS){
    html+=`<tr><td class="inst">${inst}</td>`;
    for(const d of days){ const ds=ymd(d);
      const ex=bookings.find(b=>b.instrument===inst && b.date===ds);
      if(ex){ const mine=ex.name===me;
        html+=`<td><button class="cell ${mine?"mine":"taken"}" data-id="${ex.id}" ${mine?"":"disabled"}>${mine?"Cancel":ex.name}</button></td>`;
      } else {
        html+=`<td><button class="cell" data-inst="${encodeURIComponent(inst)}" data-date="${ds}"><span class="free">+</span></button></td>`;
      }
    }
    html+="</tr>";
  }
  html+="</tbody>";
  $("grid").innerHTML=html;

  $("grid").querySelectorAll(".cell[data-date]").forEach(b=>
    b.addEventListener("click",()=>book(decodeURIComponent(b.dataset.inst), b.dataset.date)));
  $("grid").querySelectorAll(".cell.mine").forEach(b=>
    b.addEventListener("click",()=>cancel(b.dataset.id)));
}

async function book(inst,date){
  // optimistic
  const tempId="temp_"+Date.now();
  bookings.push({id:tempId,instrument:inst,date:date,name:me});
  render(); setStatus("Saving...");
  const { data, error } = await db.from("bookings")
    .insert({instrument:inst,date:date,name:me}).select().single();
  if(error){
    bookings=bookings.filter(b=>b.id!==tempId); render();
    setStatus(error.code==="23505" ? "That day is already booked." : "Couldn't book.", true);
    return;
  }
  const b=bookings.find(x=>x.id===tempId); if(b) b.id=data.id;
  setStatus("");
}

async function cancel(id){
  const removed=bookings.find(b=>b.id===id);
  bookings=bookings.filter(b=>b.id!==id);
  render(); setStatus("Saving...");
  const { error } = await db.from("bookings").delete().eq("id",id).eq("name",me);
  if(error){ if(removed){bookings.push(removed);render();} setStatus("Couldn't cancel.",true); return; }
  setStatus("");
}

// ---------- wire up ----------
$("loginBtn").addEventListener("click", doLogin);
$("pw").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
$("logoutBtn").addEventListener("click", logout);
$("prev").addEventListener("click",()=>{weekStart=addDays(weekStart,-7);render();});
$("next").addEventListener("click",()=>{weekStart=addDays(weekStart,7);render();});
$("todayBtn").addEventListener("click",()=>{weekStart=startOfWeek(new Date());render();});
document.addEventListener("visibilitychange",()=>{ if(!document.hidden && me) loadBookings(); });
setInterval(()=>{ if(me) loadBookings(); }, 30000);

// start
loadPeople().then(()=>{
  const saved=localStorage.getItem("bookingUser");
  if(saved){ $("who").value=saved; }   // remember last name (still asks password)
});
</script>
</body>
</html>
